name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Rename APKs
        run: |
          mkdir -p out
          cp app/build/outputs/apk/debug/app-debug.apk out/FB-SHARE-BX-debug.apk
          cp app/build/outputs/apk/release/app-release*.apk out/FB-SHARE-BX-release.apk

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: FB-SHARE-BX-debug
          path: out/FB-SHARE-BX-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: FB-SHARE-BX-release
          path: out/FB-SHARE-BX-release.apk

      - name: Create / Update "latest" Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: FB SHARE BX (latest build)
          body: |
            Automatic build from commit ${{ github.sha }}.
            Install the release APK on Android (enable "Install unknown apps").
          files: |
            out/FB-SHARE-BX-debug.apk
            out/FB-SHARE-BX-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
